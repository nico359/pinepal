     id="rect13" />
  <!-- Pine64-style geometric pinecone -->
  <!-- Built from overlapping diamonds (rotated squares) in rows -->
  <!-- Colors: light blue top → medium blue middle → dark blue bottom -->
  <!-- Row 1: single diamond at top -->
  <polygon
     points="64,43 70,48 64,53 58,48"
     fill="#89C4E8"
     opacity="0.9"
     id="polygon13" />
  <!-- Row 2: two overlapping diamonds -->
  <polygon
     points="58,48 64,53 58,58 52,53"
     fill="#5AADE0"
     opacity="0.9"
     id="polygon14" />
  <polygon
     points="70,48 76,53 70,58 64,53"
     fill="#5AADE0"
     opacity="0.9"
     id="polygon15" />
  <!-- Row 3: three overlapping diamonds (widest) -->
  <polygon
     points="52,53 58,58 52,63 46,58"
     fill="#3B96D4"
     opacity="0.9"
     id="polygon16" />
  <polygon
     points="64,53 70,58 64,63 58,58"
     fill="#3B96D4"
     opacity="0.9"
     id="polygon17" />
  <polygon
     points="76,53 82,58 76,63 70,58"
     fill="#3B96D4"
     opacity="0.9"
     id="polygon18" />
  <!-- Row 4: two diamonds -->
  <polygon
     points="58,58 64,63 58,68 52,63"
     fill="#2878B5"
     opacity="0.9"
     id="polygon19" />
  <polygon
     points="70,58 76,63 70,68 64,63"
     fill="#2878B5"
     opacity="0.9"
     id="polygon20" />
  <!-- Row 5: single diamond narrowing -->
  <polygon
     points="64,63 70,68 64,73 58,68"
     fill="#1A5C96"
     opacity="0.9"
     id="polygon21" />
  <!-- Stem at bottom -->
  <polygon
     points="64,73 66,76 64,82 62,76"
     fill="#1A5C96"
     id="polygon22" />
  <!-- Subtle highlight overlays on upper diamonds -->
  <polygon
     points="64,43 67,46 64,49 61,46"
     fill="white"
     opacity="0.12"
     id="polygon23" />
  <polygon
     points="58,48 61,51 58,54 55,51"
     fill="white"
     opacity="0.08"
     id="polygon24" />
  <polygon
     points="70,48 73,51 70,54 67,51"
     fill="white"
     opacity="0.08"
     id="polygon25" />
  <!-- Screen reflection -->
  <rect
     x="36"
     y="40"
     width="22"
     height="6"
     rx="3"
